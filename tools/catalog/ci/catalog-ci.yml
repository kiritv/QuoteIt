# catalog-ci.yml
#
# DEPLOY INSTRUCTIONS:
#   Copy this file to .github/workflows/catalog-ci.yml in the kiritv/QuoteIt repo.
#   It must live at the repo ROOT — GitHub Actions does not pick up workflows
#   from subdirectories like Datasets/.github/.
#
# REQUIRED REPO SECRETS (Settings → Secrets → Actions):
#   CATALOG_SIGNING_KEY        — Base64 ED25519 private key seed (32 bytes)
#   CATALOG_SIGNING_PUBLIC_KEY — Base64 ED25519 public key (32 bytes)
#
# TRIGGER:
#   • push / pull_request on Datasets/** — validates + rebuilds indexes.
#   • workflow_dispatch — manual full publish (validate + build + sign + verify + sync).
#   Catalog CI never auto-runs on app code changes.

name: Catalog CI

on:
  push:
    paths:
      - "Datasets/**"
  pull_request:
    paths:
      - "Datasets/**"
  workflow_dispatch:
    inputs:
      push_github:
        description: "Commit and push regenerated indexes to main"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  catalog-ci:
    name: Validate, Build & Sign Catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git diff check

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install catalog tooling dependencies
        run: pip install -r tools/catalog/requirements.txt

      # ── Step 1: Validate schema, pack references, program references ───────
      - name: Validate catalog
        run: python3 tools/catalog/validate_catalog.py

      # ── Step 2: Regenerate all language-scoped index files ─────────────────
      - name: Build indexes
        run: python3 tools/catalog/build_indexes.py

      # ── Step 3: Sign indexes (requires secret keys) ────────────────────────
      - name: Sign indexes
        env:
          CATALOG_SIGNING_KEY: ${{ secrets.CATALOG_SIGNING_KEY }}
          CATALOG_SIGNING_PUBLIC_KEY: ${{ secrets.CATALOG_SIGNING_PUBLIC_KEY }}
        run: python3 tools/catalog/sign_indexes.py --private-key-env CATALOG_SIGNING_KEY

      # ── Step 4: Verify signatures ──────────────────────────────────────────
      - name: Verify signatures
        env:
          CATALOG_SIGNING_PUBLIC_KEY: ${{ secrets.CATALOG_SIGNING_PUBLIC_KEY }}
        run: python3 tools/catalog/verify_signatures.py --public-key-env CATALOG_SIGNING_PUBLIC_KEY

      # ── Step 5: Sync generated output into Datasets/ tree ─────────────────
      - name: Sync generated artifacts to Datasets/
        run: python3 tools/catalog/publish_to_github.py

      # ── Step 6: Fail if Datasets publish tree is stale ────────────────────
      #   Skipped on workflow_dispatch so manual runs can commit fresh output.
      - name: Check Datasets publish tree is up to date
        if: github.event_name != 'workflow_dispatch'
        run: |
          git diff --exit-code -- Datasets/metadata Datasets/packages Datasets/packs Datasets/programs Datasets/indexes || {
            echo ""
            echo "ERROR: Published Datasets tree is stale."
            echo "Run 'python3 tools/catalog/publish_catalog.py --validate --build --sign --verify --sync-github-tree' locally and commit the result."
            exit 1
          }

      # ── Step 7: Commit and push (manual dispatch only, opt-in) ────────────
      - name: Commit and push indexes
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.push_github == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "catalog-bot"
          git config user.email "catalog-bot@users.noreply.github.com"
          python3 tools/catalog/commit_and_push.py \
            --message "catalog: regenerate indexes [ci]" \
            --pathspec Datasets/indexes Datasets/metadata Datasets/packs Datasets/programs
